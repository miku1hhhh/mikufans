name: Wayback Machine Downloader (Async)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run download script
        run: python 1.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wayback-downloads
          path: |
            wayback_downloads/
            download_stats.txt
            failed_snapshots.txt
          retention-days: 30
