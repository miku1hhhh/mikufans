name: Wayback Machine Downloader (Async)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'   # 会自动检测 pyproject.toml 并缓存依赖

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests chardet aiohttp

      - name: Run download script
        run: python 1.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wayback-downloads
          path: |
            wayback_downloads/
            download_stats.txt
          retention-days: 30
